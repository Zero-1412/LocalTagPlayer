name: 正式版桌面安装包

on:
  workflow_dispatch:
    inputs:
      version:
        description: 安装包版本号，不包含 v 前缀
        required: true
        default: 0.1.0
      publish_unsigned_release:
        description: 明确发布未签名/未公证安装包；默认只生成临时产物
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  prepare:
    name: 解析发布版本
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - id: version
        name: 解析并校验版本号
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${INPUT_VERSION:-0.1.0}"
          fi

          # 版本号将进入文件名和安装器元数据，先限制为可审查的 SemVer 形式。
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "不支持的版本号: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

  integration_gate:
    name: 分支集成与 Debug 业务门禁
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: 检查所有远程分支已合入主分支且累计合并无冲突
        shell: pwsh
        run: ./tool/check_release_branch_integration.ps1
      - name: 验证主分支业务代码
        shell: pwsh
        run: |
          flutter pub get
          flutter test
          flutter analyze
          flutter build windows --debug
      - name: 启动 Debug 应用并确认进程存活
        shell: pwsh
        run: |
          $executable = Resolve-Path "build/windows/x64/runner/Debug/local_tag_player.exe"
          $stdout = Join-Path $env:RUNNER_TEMP "local-tag-player-debug.stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "local-tag-player-debug.stderr.log"
          $process = Start-Process `
            -FilePath $executable `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -PassThru
          try {
            Start-Sleep -Seconds 10
            $process.Refresh()
            if ($process.HasExited) {
              Get-Content $stdout -Tail 80 -ErrorAction SilentlyContinue
              Get-Content $stderr -Tail 80 -ErrorAction SilentlyContinue
              throw "Debug 应用提前退出，exit code=$($process.ExitCode)"
            }
            if (-not $process.Responding) {
              throw "Debug 应用进程存活但无响应"
            }
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

  windows:
    name: Windows x64 安装器
    needs:
      - prepare
      - integration_gate
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: 获取依赖并验证静态分析
        run: |
          flutter pub get
          flutter analyze
      - name: 构建 Windows Release
        run: flutter build windows --release --build-name "$env:RELEASE_VERSION"
      - name: 准备 Windows Authenticode 证书
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw '标签发布缺少 Windows Authenticode 证书或密码。'
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP 'local-tag-player-signing.pfx'
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          )
      - name: 签名 Windows 应用程序
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          ./packaging/windows/sign_release.ps1 `
            -CertificatePath "$env:RUNNER_TEMP/local-tag-player-signing.pfx" `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD `
            -Files 'build/windows/x64/runner/Release/local_tag_player.exe'
      - name: 安装 Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          $sourceDir = (Resolve-Path "build/windows/x64/runner/Release").Path
          $outputDir = Join-Path $PWD "artifacts"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:RELEASE_VERSION" `
            "/DMySourceDir=$sourceDir" `
            "/DMyOutputDir=$outputDir" `
            "packaging/windows/local_tag_player.iss"
      - name: 签名并验证 Windows 安装器
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          ./packaging/windows/sign_release.ps1 `
            -CertificatePath "$env:RUNNER_TEMP/local-tag-player-signing.pfx" `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD `
            -Files "artifacts/LocalTagPlayer-$env:RELEASE_VERSION-windows-x64-setup.exe"
      - name: 清理 Windows 签名证书
        if: always() && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Remove-Item "$env:RUNNER_TEMP/local-tag-player-signing.pfx" -Force -ErrorAction SilentlyContinue
      - name: 记录 Windows 校验值
        shell: pwsh
        run: |
          Get-FileHash artifacts/*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding utf8 artifacts/SHA256SUMS-windows.txt
      - uses: actions/upload-artifact@v4
        with:
          name: LocalTagPlayer-${{ env.RELEASE_VERSION }}-windows-x64
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS DMG
    needs:
      - prepare
      - integration_gate
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: 获取依赖并验证静态分析
        run: |
          flutter pub get
          flutter analyze
      - name: 构建 macOS Release
        run: flutter build macos --release --build-name "$RELEASE_VERSION"
      - name: 验证 Release 进程能够启动
        shell: bash
        run: |
          set -euo pipefail
          app_path="build/macos/Build/Products/Release/local_tag_player.app"
          executable="$app_path/Contents/MacOS/local_tag_player"
          log_file="$RUNNER_TEMP/local_tag_player_macos_release.log"
          "$executable" >"$log_file" 2>&1 &
          app_pid=$!
          sleep 10
          if ! kill -0 "$app_pid" 2>/dev/null; then
            tail -n 80 "$log_file"
            exit 1
          fi
          kill "$app_pid"
          wait "$app_pid" || true
      - name: 签名并公证 macOS DMG
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          chmod +x packaging/macos/package_notarized.sh
          packaging/macos/package_notarized.sh \
            'build/macos/Build/Products/Release/local_tag_player.app' \
            "$RELEASE_VERSION" \
            "$PWD/artifacts"
      - name: 生成未公证 DMG（非标签验证）
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          set -euo pipefail
          app_path="build/macos/Build/Products/Release/local_tag_player.app"
          staging_dir="$RUNNER_TEMP/local-tag-player-dmg"
          artifact_dir="$PWD/artifacts"
          mkdir -p "$staging_dir" "$artifact_dir"
          ditto "$app_path" "$staging_dir/Local Tag Player.app"
          ln -s /Applications "$staging_dir/Applications"
          hdiutil create \
            -volname "Local Tag Player" \
            -srcfolder "$staging_dir" \
            -ov \
            -format UDZO \
            "$artifact_dir/LocalTagPlayer-$RELEASE_VERSION-macos-unnotarized.dmg"
      - name: 记录 macOS 校验值
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="$PWD/artifacts"
          # 在产物目录内计算，避免把 GitHub runner 的临时绝对路径写入公开校验文件。
          (
            cd "$artifact_dir"
            shasum -a 256 *.dmg > SHA256SUMS-macos.txt
          )
      - uses: actions/upload-artifact@v4
        with:
          name: LocalTagPlayer-${{ env.RELEASE_VERSION }}-macos
          path: artifacts/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: 发布 GitHub Release
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_unsigned_release)
    needs:
      - prepare
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载安装包产物
        uses: actions/download-artifact@v4
        with:
          pattern: LocalTagPlayer-${{ needs.prepare.outputs.version }}-*
          path: release-assets
          merge-multiple: true
      - name: 检查发布资产
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          test -f "release-assets/LocalTagPlayer-$version-windows-x64-setup.exe"
          test -f "release-assets/LocalTagPlayer-$version-macos.dmg" ||
            test -f "release-assets/LocalTagPlayer-$version-macos-unnotarized.dmg"
          test -f "release-assets/SHA256SUMS-windows.txt"
          test -f "release-assets/SHA256SUMS-macos.txt"
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Local Tag Player ${{ needs.prepare.outputs.version }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Local Tag Player 的正式桌面安装包。

            ${{ startsWith(github.ref, 'refs/tags/v') && '- Windows x64：应用程序与安装器已进行 Authenticode SHA-256 签名和 RFC 3161 时间戳验证。' || '- Windows x64：本次手动发布包未进行 Authenticode 签名；请核对 SHA-256。' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && '- macOS：应用与 DMG 已进行 Developer ID 签名、Apple notarization 和票据 stapling。' || '- macOS：本次手动发布包未进行 Developer ID 签名或 Apple notarization。' }}
            - 安装前请用随附的 SHA256SUMS 文件核对下载内容。
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/SHA256SUMS-*.txt
