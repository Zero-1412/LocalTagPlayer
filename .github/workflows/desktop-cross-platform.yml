name: macOS 与 Linux 桌面验证

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/desktop-cross-platform.yml"
      - "lib/**"
      - "test/**"
      - "linux/**"
      - "macos/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  linux:
    name: Linux adapter、构建与启动
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: 安装 Linux 桌面依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libmpv-dev mpv libsqlite3-dev xvfb
      - name: 获取 Dart 依赖
        run: flutter pub get
      - name: 验证静态边界与 adapter 契约
        run: |
          flutter analyze
          flutter test test/architecture_contract_test.dart test/desktop_file_system_adapter_test.dart
      - name: 构建 Linux debug 应用
        run: flutter build linux --debug
      - name: 启动 Linux 应用并确认进程存活
        shell: bash
        run: |
          set -euo pipefail
          log_file="$RUNNER_TEMP/local_tag_player_linux_startup.log"
          xvfb-run -a build/linux/x64/debug/bundle/local_tag_player >"$log_file" 2>&1 &
          app_pid=$!
          sleep 10
          if ! kill -0 "$app_pid" 2>/dev/null; then
            tail -n 80 "$log_file"
            exit 1
          fi
          kill "$app_pid"
          wait "$app_pid" || true

  macos:
    name: macOS adapter、构建与启动
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: 获取 Dart 依赖
        run: flutter pub get
      - name: 验证静态边界与 adapter 契约
        run: |
          flutter analyze
          flutter test test/architecture_contract_test.dart test/desktop_file_system_adapter_test.dart
      - name: 构建 macOS debug 应用
        run: flutter build macos --debug
      - name: 启动 macOS 应用并确认进程存活
        shell: bash
        run: |
          set -euo pipefail
          executable="build/macos/Build/Products/Debug/local_tag_player.app/Contents/MacOS/local_tag_player"
          log_file="$RUNNER_TEMP/local_tag_player_macos_startup.log"
          "$executable" >"$log_file" 2>&1 &
          app_pid=$!
          sleep 10
          if ! kill -0 "$app_pid" 2>/dev/null; then
            tail -n 80 "$log_file"
            exit 1
          fi
          kill "$app_pid"
          wait "$app_pid" || true
